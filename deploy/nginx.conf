# nginx reverse proxy for the World Cup Match Analyzer.
# Place in /etc/nginx/sites-available/ and symlink into sites-enabled, then:
#   sudo nginx -t && sudo systemctl reload nginx
# For HTTPS, run: sudo certbot --nginx -d your-domain.com

upstream wc_analyzer {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name your-domain.com;

    # Analysis can take 10-30s (scrapes several matches), so allow long upstream reads.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    gzip on;
    gzip_types application/json text/css application/javascript text/html;
    gzip_min_length 512;

    # Everything for this app is namespaced under /bet-stats so it coexists
    # with the domain's other endpoints. Add your other location blocks as usual.
    location /bet-stats/ {
        proxy_pass http://wc_analyzer;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
