# /etc/nginx/conf.d/compubot.online.conf
# Bet Stats app on its own domain, mirroring the album.conf pattern.
# This is the PRE-certbot (port 80) version. After you run:
#   sudo certbot --nginx -d compubot.online -d www.compubot.online
# certbot rewrites this to add the `listen 443 ssl` block + an HTTP->HTTPS
# redirect server, exactly like album.conf.
#
# NOTE: Bet Stats runs on port 8001 (album already uses 8000).

server {
    listen 80;
    listen [::]:80;
    server_name compubot.online www.compubot.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/lib/letsencrypt/;
        default_type "text/plain";
    }

    # Everything to the Bet Stats uvicorn/gunicorn process on :8001.
    # (The app is served at the root of this domain.)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;   # best-bets board computes several matches on first load
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
