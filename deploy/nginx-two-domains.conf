# Two domains on ONE VPS via name-based virtual hosting.
# Both domains' DNS A records point to this VPS's IP. nginx routes by server_name.
# The Bet Stats app (uvicorn/gunicorn on 127.0.0.1:8000) is shared and exposed
# under /bet-stats on whichever domain(s) you want.
#
# After editing: sudo nginx -t && sudo systemctl reload nginx
# TLS: sudo certbot --nginx -d compubot.cloud -d www.compubot.cloud \
#                          -d compubot.online -d www.compubot.online

upstream bet_stats {
    server 127.0.0.1:8000;   # the FastAPI app (gunicorn/uvicorn)
}

# ---------------------------------------------------------------------------
# Domain 1: compubot.cloud
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name compubot.cloud www.compubot.cloud;
    # certbot will add the listen 443 / ssl_certificate lines here.

    # Bet Stats lives under /bet-stats
    location /bet-stats/ {
        proxy_pass http://bet_stats;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Your existing site / other endpoints for compubot.cloud:
    location / {
        # e.g. proxy to another app, or serve static files
        root /var/www/compubot.cloud;
        try_files $uri $uri/ =404;
    }
}

# ---------------------------------------------------------------------------
# Domain 2: compubot.online
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name compubot.online www.compubot.online;

    # Expose Bet Stats here too (optional — same app, or skip if only on .cloud).
    location /bet-stats/ {
        proxy_pass http://bet_stats;
        proxy_http_version 1.1;
        proxy_read_timeout 120s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/compubot.online;
        try_files $uri $uri/ =404;
    }
}
