<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Bet Stats — Copa do Mundo 2026</title>
<style>
  :root {
    --bg:#0c0e12; --panel:#13161c; --panel2:#181c23; --elev:#1d222b;
    --border:#252a33; --border2:#333a45;
    --text:#e6e8ec; --muted:#878e99;
    --accent:#5fa07a;     /* positive / value / accuracy */
    --accent2:#5b8cff;    /* primary */
    --accent3:#6f7bd6;    /* AI panel */
    --warn:#c79a4a; --bad:#c66b66;
    --shadow:0 1px 2px rgba(0,0,0,.4), 0 6px 16px rgba(0,0,0,.22);
    --r:10px;
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,Arial,sans-serif;
         background:var(--bg); color:var(--text); -webkit-text-size-adjust:100%; line-height:1.45; }
  header { padding:14px 20px; border-bottom:1px solid var(--border); position:sticky; top:0;
           background:rgba(12,14,18,.9); backdrop-filter:blur(8px); z-index:5; }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand svg { color:var(--accent2); flex:0 0 auto; }
  h1 { font-size:17px; margin:0; font-weight:650; letter-spacing:-.01em; color:var(--text); }
  h1 .dim { color:var(--muted); font-weight:500; }
  .sub { color:var(--muted); font-size:12.5px; margin-top:4px; }
  nav { display:flex; gap:6px; margin-top:14px; }
  nav button { flex:0 0 auto; border-radius:8px; color:var(--muted); background:transparent; border-color:transparent; }
  nav button:hover:not(.active) { background:var(--panel2); color:var(--text); }
  nav button.active { background:rgba(91,140,255,.12); color:var(--accent2); border-color:rgba(91,140,255,.32); font-weight:600; }
  main { max-width:1040px; margin:0 auto; padding:20px 16px 64px; }
  .day { margin:22px 0 10px; font-size:11px; color:var(--muted); font-weight:650; text-transform:uppercase;
         letter-spacing:.08em; display:flex; align-items:center; gap:12px; }
  .day::after { content:""; flex:1; height:1px; background:var(--border); }
  .match { background:var(--panel); border:1px solid var(--border); border-radius:var(--r); margin:8px 0;
           overflow:hidden; transition:border-color .15s, box-shadow .15s; }
  .match:hover { border-color:var(--border2); }
  .match.open { border-color:var(--border2); box-shadow:var(--shadow); }
  .match-head { display:flex; align-items:center; gap:12px; padding:13px 15px; cursor:pointer; }
  .match-head:hover { background:var(--panel2); }
  .time { font-variant-numeric:tabular-nums; color:var(--text); width:44px; font-size:13.5px; font-weight:600; flex:0 0 auto; }
  .teams { flex:1; font-weight:550; min-width:0; font-size:14.5px; }
  .group { color:var(--muted); font-size:12px; flex:0 0 auto; }
  .status { font-size:11px; font-weight:600; padding:2px 8px; border-radius:6px; background:var(--panel2);
            color:var(--muted); border:1px solid var(--border); flex:0 0 auto; }
  .status:not(:empty) { color:var(--text); }
  .status.live { color:var(--bad); border-color:rgba(198,107,102,.4); }
  .chev { color:var(--muted); transition:transform .15s; flex:0 0 auto; display:inline-flex; }
  .match.open .chev { transform:rotate(90deg); color:var(--text); }
  .detail { display:none; padding:2px 15px 16px; border-top:1px solid var(--border); }
  .match.open .detail { display:block; }
  .toolbar { display:flex; gap:7px; align-items:center; flex-wrap:wrap; padding:12px 0; }
  button { font:inherit; font-size:13px; border:1px solid var(--border); background:var(--panel2); color:var(--text);
           padding:7px 12px; border-radius:8px; cursor:pointer; display:inline-flex; align-items:center; gap:6px;
           transition:border-color .15s, background .15s, color .15s; }
  button:hover:not(:disabled) { border-color:var(--border2); background:var(--elev); }
  button:disabled { opacity:.4; cursor:default; }
  button svg, nav button svg { width:14px; height:14px; flex:0 0 auto; }
  button.primary { background:var(--accent2); color:#0b1020; border-color:var(--accent2); font-weight:600; }
  button.primary:hover:not(:disabled) { background:#719cff; border-color:#719cff; }
  .badge { font-size:11px; font-weight:600; padding:2px 9px; border-radius:6px; border:1px solid var(--border); }
  .badge.ok { color:var(--accent); border-color:rgba(95,160,122,.4); }
  .badge.prov { color:var(--warn); border-color:rgba(199,154,74,.4); }
  .pill { font-size:11px; padding:3px 9px; border-radius:6px; border:1px solid var(--border); color:var(--muted); background:var(--panel); }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:12px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:var(--r); padding:14px 15px; }
  .card h3 { margin:0 0 11px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em;
             font-weight:650; padding-bottom:9px; border-bottom:1px solid var(--border); }
  .scroll { overflow-x:auto; -webkit-overflow-scrolling:touch; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { text-align:left; padding:6px 7px; border-bottom:1px solid var(--border); white-space:nowrap; }
  tr:last-child td { border-bottom:none; }
  table tr:hover td { background:var(--panel2); }
  th { color:var(--muted); font-weight:600; font-size:10.5px; text-transform:uppercase; letter-spacing:.04em; }
  td.p, th.p { text-align:right; font-variant-numeric:tabular-nums; }
  .three { display:flex; gap:8px; flex-wrap:wrap; }
  .three div { flex:1 1 0; min-width:74px; text-align:center; background:var(--panel2); border:1px solid var(--border);
               border-radius:8px; padding:11px 6px; }
  .three .v { font-size:18px; font-weight:700; letter-spacing:-.01em; }
  .three .l { font-size:10.5px; color:var(--muted); margin-top:3px; }
  .pbar { display:flex; height:6px; border-radius:4px; overflow:hidden; margin:11px 0 4px; background:var(--panel2); }
  .pbar i { display:block; height:100%; }
  .conf-low { color:var(--bad)!important; } .conf-medium { color:var(--warn)!important; } .conf-high { color:var(--accent)!important; }
  .muted { color:var(--muted); font-size:12px; }
  .err { color:var(--bad); font-size:13px; }
  .spin { display:inline-block; width:14px; height:14px; border:2px solid var(--border2); border-top-color:var(--accent2);
          border-radius:50%; animation:s .7s linear infinite; vertical-align:-2px; }
  @keyframes s { to { transform:rotate(360deg); } }
  .ml { font-size:12px; margin:3px 0; }
  .ml .mlk { color:var(--muted); }
  .ml b { color:var(--text); font-weight:600; }
  .mlbox { margin-top:11px; padding-top:9px; border-top:1px solid var(--border); }
  .mlbox .h { font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:5px; }
  /* flat side-accented info panels */
  .preds, .gemini, .gpanel, .ref { background:var(--panel); border:1px solid var(--border); border-radius:var(--r);
            padding:13px 15px; margin-top:12px; border-left:2px solid var(--border2); }
  .preds { border-left-color:var(--accent2); }
  .gemini { border-left-color:var(--accent); }
  .gpanel { border-left-color:var(--accent3); }
  .preds h3, .gemini h3, .gpanel h3 { margin:0 0 10px; font-size:13px; font-weight:600;
            display:flex; align-items:center; gap:7px; }
  .preds h3 { color:var(--text); } .gemini h3 { color:var(--accent); } .gpanel h3 { color:var(--accent3); }
  .preds h3 svg, .gpanel h3 svg { color:var(--accent2); } .gpanel h3 svg { color:var(--accent3); }
  .preds td b { color:var(--text); }
  .gemini li, .gpanel li { margin:4px 0; }
  .ref { font-size:13px; display:flex; align-items:center; gap:8px; border-left-color:var(--warn); }
  .ref svg { color:var(--warn); flex:0 0 auto; }
  .gres { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:9px; }
  .gres .gh { font-size:10.5px; font-weight:650; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; margin-bottom:6px; }
  .oddin { width:58px; padding:5px 7px; border:1px solid var(--border); background:var(--bg); color:var(--text);
           border-radius:6px; font:inherit; font-size:12px; }
  .oddin:focus { outline:none; border-color:var(--accent2); }
  .oddcell { white-space:nowrap; }
  .valout { margin-left:7px; font-size:12px; }
  ::selection { background:rgba(91,140,255,.25); }
  .scroll::-webkit-scrollbar { height:8px; width:8px; }
  .scroll::-webkit-scrollbar-thumb { background:var(--border2); border-radius:8px; }
  details.players summary { cursor:pointer; color:var(--accent2); font-size:13px; margin-top:8px; font-weight:550; }
  @media (max-width:640px) {
    header { padding:12px 14px; }
    main { padding:14px 11px 50px; }
    .grid { grid-template-columns:1fr; }
    .group { display:none; }
    .match-head { gap:9px; padding:12px; }
    .teams { font-size:14px; }
    table { font-size:12px; }
    th,td { padding:5px 6px; }
    .three .v { font-size:16px; }
    nav { overflow-x:auto; }
  }
</style>
</head>
<body>
<header>
  <div class="brand"><span id="brand-mark"></span><h1>Bet Stats <span class="dim">· Copa do Mundo 2026</span></h1></div>
  <div class="sub">Probabilidades calculadas a partir de dados de desempenho. Horários no fuso de Brasília.</div>
  <nav>
    <button id="nav-best" onclick="showView('best')"></button>
    <button id="nav-matches" class="active" onclick="showView('matches')"></button>
    <button id="nav-finished" onclick="showView('finished')"></button>
    <button id="nav-dash" onclick="showView('dashboard')"></button>
  </nav>
</header>
<main>
  <div id="view-best" style="display:none"></div>
  <div id="view-matches"><p class="muted"><span class="spin"></span> Carregando jogos…</p></div>
  <div id="view-finished" style="display:none"></div>
  <div id="view-dashboard" style="display:none"></div>
</main>

<script>
const BASE = "";
const pct = p => (p == null ? "–" : (p * 100).toFixed(1) + "%");
// heat color: muted red (low) -> neutral (~50%) -> muted green (high) — desaturated for a sober look
function pColor(p) {
  if (p == null) return "var(--muted)";
  const hue = Math.max(0, Math.min(1, p)) * 135;       // 0=red .. 135=green
  return `hsl(${hue.toFixed(0)},42%,62%)`;
}

// minimal monochrome line icons (inherit currentColor)
const _svg = d => `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex:0 0 auto;vertical-align:-2px">${d}</svg>`;
const ICON = {
  logo: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="5"/><path d="M8 15v-3M12 15V9M16 15v-4"/></svg>`,
  star: _svg('<path d="M12 4l2.4 4.9 5.4.8-3.9 3.8.9 5.3-4.8-2.5-4.8 2.5.9-5.3L4.2 9.7l5.4-.8z"/>'),
  calendar: _svg('<rect x="3.5" y="5" width="17" height="15" rx="2"/><path d="M3.5 9.5h17M8 3v4M16 3v4"/>'),
  check: _svg('<circle cx="12" cy="12" r="8.5"/><path d="M8.5 12.3l2.4 2.4 4.6-5"/>'),
  chart: _svg('<path d="M4 20h16"/><path d="M7 20v-6M12 20V7M17 20v-9"/>'),
  target: _svg('<circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="4.5"/><circle cx="12" cy="12" r="1"/>'),
  spark: _svg('<path d="M12 3l1.7 4.8L18.5 9l-4.8 1.7L12 15l-1.7-4.3L5.5 9l4.8-1.2z"/><path d="M18 15l.7 2 .. "/>'),
  flag: _svg('<path d="M5.5 21V4M5.5 4.5h11l-2 3.3 2 3.2h-11"/>'),
  user: _svg('<circle cx="12" cy="8" r="3.6"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>'),
  layers: _svg('<path d="M12 3l9 5-9 5-9-5 9-5z"/><path d="M3 13l9 5 9-5"/>'),
  refresh: _svg('<path d="M20 11a8 8 0 1 0-.6 3.5"/><path d="M20 5v5h-5"/>'),
  clock: _svg('<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3.2 1.9"/>'),
  shield: _svg('<path d="M12 3.5l7 2.5v5c0 4.4-3 7.7-7 8.9-4-1.2-7-4.5-7-8.9V6z"/>'),
};
ICON.spark = _svg('<path d="M12 3l1.8 5L19 9.8l-5.2 1.8L12 17l-1.8-5.4L5 9.8 10.2 8z"/>');

// inject brand mark + nav icons (DOM is ready: script is at end of body)
(function iconizeChrome() {
  const bm = document.getElementById("brand-mark"); if (bm) bm.innerHTML = ICON.logo;
  const set = (id, ic, lab) => { const b = document.getElementById(id); if (b) b.innerHTML = ic + "<span>" + lab + "</span>"; };
  set("nav-best", ICON.star, "Melhores palpites");
  set("nav-matches", ICON.calendar, "Próximos jogos");
  set("nav-finished", ICON.check, "Finalizados");
  set("nav-dash", ICON.chart, "Desempenho");
})();
// colored probability cell text
const pc = p => p == null ? '<span class="muted">–</span>'
  : `<span style="color:${pColor(p)};font-weight:600">${(p * 100).toFixed(1)}%</span>`;
const el = (t, c, h) => { const e = document.createElement(t); if (c) e.className = c; if (h != null) e.innerHTML = h; return e; };
const chk = c => c == null ? '<span class="muted">–</span>' : (c ? '<span style="color:var(--accent)">✓</span>' : '<span style="color:var(--bad)">✗</span>');
let GEMINI_ENABLED = false;

async function api(path, opts) {
  const r = await fetch(BASE + path, opts);
  if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || ("HTTP " + r.status)); }
  return r.json();
}

function showView(v) {
  for (const [id, name] of [["view-best","best"],["view-matches","matches"],["view-finished","finished"],["view-dashboard","dashboard"]])
    document.getElementById(id).style.display = v === name ? "" : "none";
  for (const [id, name] of [["nav-best","best"],["nav-matches","matches"],["nav-finished","finished"],["nav-dash","dashboard"]])
    document.getElementById(id).classList.toggle("active", v === name);
  if (v === "dashboard") loadDashboard();
  if (v === "finished") renderFinished();
  if (v === "best") loadBestBets();
}

// value/EV: any odds input recomputes its result cell (event delegation)
document.addEventListener("input", e => {
  if (!e.target.classList || !e.target.classList.contains("oddin")) return;
  const prob = parseFloat(e.target.dataset.prob);
  const out = e.target.nextElementSibling;
  const odd = parseFloat((e.target.value || "").replace(",", "."));
  if (!odd || odd <= 1 || isNaN(prob)) { out.innerHTML = ""; return; }
  const implied = 1 / odd, edge = prob - implied, ev = prob * (odd - 1) - (1 - prob);
  if (edge > 0)
    out.innerHTML = `<b style="color:var(--accent)">VALOR +${(edge*100).toFixed(1)}%</b> <span class="muted">EV ${ev>=0?"+":""}${ev.toFixed(2)}</span>`;
  else
    out.innerHTML = `<span class="muted">sem valor (${(edge*100).toFixed(1)}%)</span>`;
});

let RELIABILITY = null;
function relBadge(cat) {
  const r = RELIABILITY && RELIABILITY[cat];
  if (!r || r.rate == null) return '<span class="muted">–</span>';
  return `<span title="${r.hits}/${r.total} acertos em jogos passados">${pc(r.rate)}</span>`;
}
const oddInput = prob => `<input class="oddin" data-prob="${prob}" placeholder="odd" inputmode="decimal"><span class="valout"></span>`;

// ---------- matches ----------
let DAYS = [];
let finishedRendered = false;

async function boot() {
  try { GEMINI_ENABLED = (await api("/api/config")).geminiEnabled; } catch {}
  const root = document.getElementById("view-matches");
  try {
    const { days } = await api("/api/matches");
    DAYS = days;
    renderMatchList(root, m => m.statusType !== "finished",
                    "Nenhum jogo futuro — veja a aba Finalizados.");
  } catch (e) {
    root.innerHTML = '<p class="err">Falha ao carregar jogos: ' + e.message + '</p>';
  }
  // Reliability is slow on a cold cache; fetch it in the BACKGROUND so it never
  // blocks the match list. Badges fill in once it resolves.
  api("/api/reliability").then(r => { RELIABILITY = r.byMarket; }).catch(() => {});
}

function renderMatchList(root, filter, emptyMsg) {
  root.innerHTML = "";
  let any = false;
  for (const day of DAYS) {
    const ms = day.matches.filter(filter);
    if (!ms.length) continue;
    any = true;
    root.appendChild(el("div", "day", day.label));
    for (const m of ms) root.appendChild(matchRow(m));
  }
  if (!any) root.innerHTML = '<p class="muted">' + (emptyMsg || "Nada por aqui.") + '</p>';
}

function renderFinished() {
  if (finishedRendered) return;
  finishedRendered = true;
  renderMatchList(document.getElementById("view-finished"),
                  m => m.statusType === "finished", "Nenhum jogo finalizado ainda.");
}

// ---------- best bets board ----------
let bestLoaded = false;
async function loadBestBets(force) {
  const root = document.getElementById("view-best");
  if (bestLoaded && !force) return;
  root.innerHTML = '<p class="muted"><span class="spin"></span> Calculando os melhores palpites dos próximos jogos… (pode demorar na 1ª vez)</p>';
  try { renderBestBets(root, await api("/api/best-bets")); bestLoaded = true; }
  catch (e) { root.innerHTML = '<p class="err">Erro: ' + e.message + '</p>'; }
}

let lastBestBets = null, bestSort = "score";
const BEST_SORTS = [["score", "star", "Melhor"], ["time", "clock", "Horário"], ["rel", "shield", "Confiança"]];

function renderBestBets(root, d) { lastBestBets = d; drawBestBets(); }
function setBestSort(mode) { bestSort = mode; drawBestBets(); }

let bestTab = "market";
function setBestTab(t) { bestTab = t; drawBestBets(); }

function drawBestBets() {
  const root = document.getElementById("view-best");
  const d = lastBestBets;
  root.innerHTML = "";
  const head = el("div", "toolbar");
  head.innerHTML = `<span class="pill">${d.matchesConsidered} jogos · próximas ${d.windowHours}h</span>`;
  const rb = el("button", "", ICON.refresh + "<span>Recalcular</span>"); rb.onclick = () => loadBestBets(true);
  head.appendChild(rb);
  // sub-tabs: mercados vs jogadores
  for (const [k, ic, lab] of [["market", ICON.layers, "Mercados"], ["player", ICON.user, "Jogadores"]]) {
    const tb = el("button", k === bestTab ? "primary" : "", ic + "<span>" + lab + "</span>");
    tb.onclick = () => setBestTab(k);
    head.appendChild(tb);
  }
  root.appendChild(head);

  const sortbar = el("div", "toolbar");
  sortbar.appendChild(el("span", "muted", "ordenar:"));
  for (const [k, ic, lab] of BEST_SORTS) {
    const sb = el("button", k === bestSort ? "primary" : "", ICON[ic] + "<span>" + lab + "</span>");
    sb.onclick = () => setBestSort(k);
    sortbar.appendChild(sb);
  }
  root.appendChild(sortbar);

  const isPlayer = bestTab === "player";
  const list = [...(isPlayer ? (d.playerBets || []) : (d.bets || []))];
  if (!list.length) { root.appendChild(el("p", "muted", "Nada na janela atual.")); return; }
  root.appendChild(el("p", "muted", "Ranqueado por confiança × acerto histórico². Digite a odd da casa para ver se há VALOR."));

  if (bestSort === "time") list.sort((a, b) => (a.startTimestamp || 0) - (b.startTimestamp || 0) || b.score - a.score);
  else if (bestSort === "rel") list.sort((a, b) => (b.reliability ?? -1) - (a.reliability ?? -1) || b.score - a.score);
  else list.sort((a, b) => b.score - a.score);

  const wrap = el("div", "scroll"); const t = el("table");
  const firstCol = isPlayer ? "Jogador" : "Jogo";
  t.innerHTML = `<tr><th>${firstCol}</th><th class="p">Início</th><th>Mercado</th><th>Palpite</th><th class="p">Prob.</th><th class="p">Confiab.</th><th class="p">Odd → Valor</th></tr>`;
  for (const b of list) {
    const rel = b.reliability != null ? pc(b.reliability) : '<span class="muted">–</span>';
    const first = isPlayer
      ? `<td>${b.player}<div class="muted">${b.home} x ${b.away}</div></td>`
      : `<td>${b.home} <span class="muted">x</span> ${b.away}</td>`;
    t.innerHTML += `<tr>${first}`
      + `<td class="p muted">${b.time || ""}</td>`
      + `<td>${b.market}</td><td><b>${b.selection}</b></td>`
      + `<td class="p">${pc(b.prob)}</td><td class="p">${rel}</td>`
      + `<td class="oddcell">${oddInput(b.prob)}</td></tr>`;
  }
  wrap.appendChild(t); root.appendChild(wrap);
}

function matchRow(m) {
  const wrap = el("div", "match"); wrap.dataset.id = m.id;
  const statusCls = m.statusType === "inprogress" ? "live" : "";
  const head = el("div", "match-head");
  head.innerHTML = `
    <span class="time">${m.time || "--:--"}</span>
    <span class="teams">${m.home ?? "?"} <span class="muted">x</span> ${m.away ?? "?"}</span>
    ${m.group ? `<span class="group">${m.group}</span>` : ""}
    <span class="status ${statusCls}">${m.statusText || ""}</span>
    <span class="chev">›</span>`;
  const detail = el("div", "detail", '<p class="muted">Clique para analisar.</p>');
  head.onclick = () => {
    wrap.classList.toggle("open");
    if (wrap.classList.contains("open") && !wrap.dataset.loaded) loadAnalysis(wrap, detail, m.id);
  };
  wrap.append(head, detail);
  return wrap;
}

async function loadAnalysis(wrap, detail, id) {
  wrap.dataset.loaded = "1";
  detail.innerHTML = '<p class="muted"><span class="spin"></span> Coletando estatísticas e calculando…</p>';
  try { renderAnalysis(detail, id, await api("/api/analyze/" + id)); }
  catch (e) { wrap.dataset.loaded = ""; detail.innerHTML = '<p class="err">Erro: ' + e.message + '</p>'; }
}

function mlBox(title, rows) {
  // rows: [[label, items, fmt]]
  const box = el("div", "mlbox");
  box.appendChild(el("div", "h", title));
  for (const [label, items, fmt] of rows) {
    if (!items || !items.length) continue;
    const txt = items.map(i => `<b>${fmt(i)}</b> (${pct(i.prob)})`).join(" · ");
    box.appendChild(el("div", "ml", `<span class="mlk">${label}:</span> ${txt}`));
  }
  return box;
}
const fmtVal = i => i.value, fmtLabel = i => i.label;

function renderAnalysis(detail, id, data) {
  detail.innerHTML = "";
  const home = data.event.home.name, away = data.event.away.name;

  const bar = el("div", "toolbar");
  const confirmed = data.lineupConfirmed;
  bar.innerHTML = `<span class="badge ${confirmed ? "ok" : "prov"}">${confirmed ? "Escalação confirmada" : "Escalação provisória"}</span>
    <span class="pill">amostra: ${data.meta.homeMatchesSampled}/${data.meta.awayMatchesSampled} jogos</span>
    <span class="pill">confiança: ${data.meta.confidence}</span>`;
  const refreshBtn = el("button", "", ICON.refresh + "<span>Atualizar escalação</span>");
  refreshBtn.disabled = confirmed;
  refreshBtn.onclick = () => doRefresh(detail, id, refreshBtn);
  bar.appendChild(refreshBtn);
  detail.appendChild(bar);

  // referee
  if (data.referee) {
    const r = data.referee;
    const info = r.known
      ? `${r.name} (${r.country || "?"}) — média ${r.avgYellow} cartões/jogo em ${r.matches} jogo(s); fator <b>${r.factor}×</b> (liga ${r.leagueAvg})`
      : `${r.name || "árbitro indefinido"} — sem histórico; fator cartões neutro (1×)`;
    detail.appendChild(el("div", "ref", `${ICON.flag}<span><b>Árbitro:</b> ${info}</span>`));
  }

  if (data.predictions) detail.appendChild(renderPredictions(data.predictions));
  if (data.accuracy) detail.appendChild(renderAccuracy(data.accuracy));

  const g = data.goals, ml = g.mostLikely;
  const grid = el("div", "grid");

  // result
  const resCard = el("div", "card");
  resCard.appendChild(el("h3", null, "Resultado (1X2)"));
  const three = el("div", "three");
  three.innerHTML = `
    <div><div class="v" style="color:${pColor(g.result.home)}">${pct(g.result.home)}</div><div class="l">${home}</div></div>
    <div><div class="v" style="color:${pColor(g.result.draw)}">${pct(g.result.draw)}</div><div class="l">Empate</div></div>
    <div><div class="v" style="color:${pColor(g.result.away)}">${pct(g.result.away)}</div><div class="l">${away}</div></div>`;
  resCard.appendChild(three);
  const pbar = el("div", "pbar");
  pbar.innerHTML = `<i style="width:${g.result.home*100}%;background:var(--accent2)"></i>`
    + `<i style="width:${g.result.draw*100}%;background:var(--muted)"></i>`
    + `<i style="width:${g.result.away*100}%;background:var(--accent3)"></i>`;
  resCard.appendChild(pbar);
  resCard.appendChild(el("p", "muted", `Gols esperados: ${home} ${g.expectedGoals.home} — ${g.expectedGoals.away} ${away}`));
  resCard.appendChild(ouTable("Over/Under Gols", g.overUnder));
  resCard.appendChild(kvTable("Ambos marcam", {"Sim":g.btts.yes, "Não":g.btts.no}));
  resCard.appendChild(mlBox("Mais prováveis", [
    ["Total de gols", ml.totalGoals, i => i.value + " gols"],
    [`Gols ${home}`, ml.homeGoals, fmtVal],
    [`Gols ${away}`, ml.awayGoals, fmtVal],
    ["Over/Under", ml.overUnder, fmtLabel],
    ["Placar", ml.score, fmtLabel],
  ]));
  grid.appendChild(resCard);

  // correct score + handicap
  const csCard = el("div", "card");
  csCard.appendChild(el("h3", null, "Placar & handicap"));
  csCard.appendChild(probList(g.correctScore.map(c => [c.score, c.prob])));
  csCard.appendChild(ouTable("Handicap asiático (mando " + home + ")", null, g.asianHandicap, home, away));
  grid.appendChild(csCard);

  // team props
  for (const [key, p] of Object.entries(data.teamProps)) {
    const c = el("div", "card");
    c.appendChild(el("h3", null, p.label));
    if (p.home) c.appendChild(ouTable(home + " — linhas", p.home.lines));
    if (p.away) c.appendChild(ouTable(away + " — linhas", p.away.lines));
    if (p.total) c.appendChild(ouTable("Total — linhas", p.total.lines));
    const rows = [];
    if (p.total) rows.push([`Total ${p.label.toLowerCase()}`, p.total.mostLikely, fmtVal]);
    if (p.home) rows.push([`${home}`, p.home.mostLikely, fmtVal]);
    if (p.away) rows.push([`${away}`, p.away.mostLikely, fmtVal]);
    c.appendChild(mlBox("Mais prováveis", rows));
    grid.appendChild(c);
  }
  detail.appendChild(grid);

  const actualsMap = data.accuracy ? data.accuracy.playersActual : null;
  detail.appendChild(playerSection(home, data.playerProps.home, actualsMap));
  detail.appendChild(playerSection(away, data.playerProps.away, actualsMap));

  detail.appendChild(renderGeminiPanel(id));
}

function ouTable(title, lines, handicap, home, away) {
  const c = el("div");
  c.appendChild(el("div", "muted", title));
  const wrap = el("div", "scroll"); const t = el("table");
  if (handicap) {
    t.innerHTML = "<tr><th>Linha</th><th class='p'>" + home + "</th><th class='p'>" + away + "</th></tr>";
    for (const [line, v] of Object.entries(handicap))
      t.innerHTML += `<tr><td>${line}</td><td class="p">${pc(v.home)}</td><td class="p">${pc(v.away)}</td></tr>`;
  } else {
    t.innerHTML = "<tr><th>Linha</th><th class='p'>Over</th><th class='p'>Under</th></tr>";
    for (const [line, v] of Object.entries(lines))
      t.innerHTML += `<tr><td>${line}</td><td class="p">${pc(v.over)}</td><td class="p">${pc(v.under)}</td></tr>`;
  }
  wrap.appendChild(t); c.appendChild(wrap);
  return c;
}

function kvTable(title, obj) {
  const c = el("div");
  c.appendChild(el("div", "muted", title));
  const t = el("table");
  for (const [k, v] of Object.entries(obj)) t.innerHTML += `<tr><td>${k}</td><td class="p">${pc(v)}</td></tr>`;
  c.appendChild(t);
  return c;
}

function probList(pairs) {
  const t = el("table");
  for (const [k, v] of pairs) t.innerHTML += `<tr><td>${k}</td><td class="p">${pc(v)}</td></tr>`;
  return t;
}

// favored pick at the line nearest the expected value -> {label, prob}
function pickFromLines(lines, expected) {
  if (!lines) return null;
  let best = null, bd = Infinity;
  for (const k of Object.keys(lines)) {
    const d = Math.abs(parseFloat(k) - (expected == null ? parseFloat(k) : expected));
    if (d < bd) { bd = d; best = k; }
  }
  const v = lines[best];
  return v.over >= v.under ? { label: "+" + best, prob: v.over } : { label: "−" + best, prob: v.under };
}

function pickCell(prop) {
  if (!prop || !prop.lines) return '<span class="muted">sem dados</span>';
  const pk = pickFromLines(prop.lines, prop.expected);
  return `<b>${pk.label}</b> <span style="color:${pColor(pk.prob)}">${(pk.prob*100).toFixed(0)}%</span>`
    + `<div class="muted">esperado ${prop.expected}</div>`;
}

function playerSection(teamName, players, actuals) {
  const d = el("details", "players");
  d.appendChild(el("summary", null, `Palpites por jogador — ${teamName} (${players.length})`));
  const wrap = el("div", "scroll"); const t = el("table");
  const realHead = actuals ? '<th class="p">Real C/F/Cart.</th>' : '';
  t.innerHTML = `<tr><th>Jogador</th><th>Chutes</th><th>Faltas</th><th class="p">Cartão</th>${realHead}<th class="p">Conf.</th></tr>`;
  for (const p of players) {
    if (!p.appearances) { t.innerHTML += `<tr><td>${p.name}</td><td colspan="${actuals?5:4}" class="muted">sem amostras</td></tr>`; continue; }
    const cardCell = p.card ? `<b>${pct(p.card.probAtLeastOne)}</b><div class="muted">recebe cartão</div>` : '–';
    let realCell = '';
    if (actuals) {
      const ra = actuals[p.playerId];
      realCell = ra ? `<td class="p">${ra.shots == null ? '–' : ra.shots} / ${ra.fouls} / ${ra.yellow}</td>` : '<td class="p muted">não jogou</td>';
    }
    t.innerHTML += `<tr><td>${p.name} <span class="muted">(${p.appearances}j)</span></td>`
      + `<td>${pickCell(p.shots)}</td><td>${pickCell(p.fouls)}</td>`
      + `<td class="p">${cardCell}</td>${realCell}<td class="p conf-${p.confidence}">${p.confidence}</td></tr>`;
  }
  wrap.appendChild(t); d.appendChild(wrap);
  d.appendChild(el("p", "muted", "Palpite = linha mais provável. “+1.5 chutes” = mais de 1,5 finalizações; “−0.5” = menos. Cartão = chance de receber ao menos 1."));
  return d;
}

function renderPredictions(preds) {
  const box = el("div", "preds");
  box.appendChild(el("h3", null, ICON.target + "<span>Previsões do modelo</span>"));
  const wrap = el("div", "scroll"); const t = el("table");
  t.innerHTML = '<tr><th>Mercado</th><th>Palpite</th><th class="p">Prob.</th><th class="p" title="Acerto histórico do modelo neste mercado">Confiab.</th><th class="p">Odd → Valor</th></tr>';
  for (const p of preds)
    t.innerHTML += `<tr><td>${p.market}</td><td><b>${p.selection}</b></td>`
      + `<td class="p">${pc(p.prob)}</td><td class="p">${relBadge(p.category)}</td>`
      + `<td class="oddcell">${oddInput(p.prob)}</td></tr>`;
  wrap.appendChild(t); box.appendChild(wrap);
  box.appendChild(el("p", "muted", "Confiab. = acerto histórico do modelo no mercado. Digite a odd da casa para ver se há VALOR (modelo > mercado)."));
  return box;
}

function renderAccuracy(a) {
  const card = el("div", "gemini");
  const s = a.summary;
  const mkt = s.marketHitRate == null ? '–' : pct(s.marketHitRate);
  const plr = s.playerHitRate == null ? '–' : pct(s.playerHitRate);
  let html = '<h3>' + ICON.check + '<span>Conferência de acertos — jogo finalizado</span></h3>';
  html += `<div class="three" style="margin-bottom:10px">
    <div><div class="v">${a.result.correct ? '✓' : '✗'}</div><div class="l">Resultado</div></div>
    <div><div class="v">${mkt}</div><div class="l">Mercados (${s.marketLineHits}/${s.marketLineTotal})</div></div>
    <div><div class="v">${plr}</div><div class="l">Jogadores (${s.playerLineHits}/${s.playerLineTotal})</div></div>
    <div><div class="v">${s.brier}</div><div class="l">Brier</div></div></div>`;
  const rows = [];
  const r = a.result;
  const totalGoals = r.scoreStr.split('-').reduce((x, y) => (+x) + (+y), 0);
  rows.push(['Resultado', `${r.predicted} (${pct(r.predictedProb)})`, `${r.scoreStr} → ${r.actual}`, r.correct]);
  for (const ou of a.overUnderGoals) rows.push([`Gols O/U ${ou.line}`, `${ou.modelSide} (${pct(ou.predOver)})`, `${totalGoals} gols`, ou.correct]);
  rows.push(['Ambos marcam', `${a.btts.modelSide} (${pct(a.btts.predYes)})`, a.btts.actual ? 'Sim' : 'Não', a.btts.correct]);
  for (const [, tp] of Object.entries(a.teamProps)) {
    const tot = tp.scopes.total; if (!tot) continue;
    const mid = tot.lines[Math.floor(tot.lines.length / 2)];
    rows.push([tp.label + ' (total)', `${mid.modelSide} ${mid.line} (${pct(mid.predOver)})`, `${tot.actual} (prev. ${tot.expected})`, mid.correct]);
  }
  const wrap = el("div", "scroll"); const t = el("table");
  t.innerHTML = '<tr><th>Mercado</th><th>Previsão</th><th>Real</th><th class="p">Acerto</th></tr>';
  for (const [m, pr, re, ok] of rows) t.innerHTML += `<tr><td>${m}</td><td>${pr}</td><td>${re}</td><td class="p">${chk(ok)}</td></tr>`;
  wrap.appendChild(t);
  card.innerHTML = html; card.appendChild(wrap);
  card.appendChild(el("p", "muted", "Previsões geradas só com jogos anteriores a esta partida (pré-jogo)."));
  return card;
}

async function doRefresh(detail, id, btn) {
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> Atualizando…';
  try { renderAnalysis(detail, id, await api("/api/refresh/" + id, { method: "POST" })); }
  catch (e) { btn.disabled = false; btn.textContent = "↻ Atualizar escalação"; alert("Falha: " + e.message); }
}

function renderGeminiPanel(id) {
  const box = el("div", "gpanel");
  loadGemini(id, box);
  return box;
}

async function loadGemini(id, box) {
  const head = '<h3>' + ICON.spark + '<span>Análise da IA (Gemini)</span></h3>';
  box.innerHTML = head + '<p class="muted"><span class="spin"></span> carregando…</p>';
  try { renderGeminiBox(id, box, await api("/api/gemini/" + id)); }
  catch (e) { box.innerHTML = head + '<p class="err">' + e.message + '</p>'; }
}

function renderGeminiBox(id, box, info) {
  box.innerHTML = "";
  box.appendChild(el("h3", null, ICON.spark + "<span>Análise da IA (Gemini)</span>"));
  if (!info.enabled)
    box.appendChild(el("p", "muted", "IA desativada — configure GEMINI_API_KEY no servidor para habilitar."));
  info.analyses.forEach((a, i) => box.appendChild(geminiResult(a, i + 1, info.limit)));
  if (info.final) box.appendChild(geminiFinal(info.final));

  const btn = el("button", "primary");
  if (!info.enabled) { btn.innerHTML = ICON.spark + "<span>Pedir análise da IA</span>"; btn.disabled = true; }
  else if (info.canAnalyze) { btn.innerHTML = ICON.spark + `<span>Pedir análise da IA (${info.used}/${info.limit})</span>`; }
  else if (info.canFinal) { btn.innerHTML = ICON.target + "<span>Gerar análise final (comparar as 2)</span>"; }
  else { btn.textContent = "Análise final concluída"; btn.disabled = true; }
  btn.onclick = () => runGemini(id, box, btn);
  box.appendChild(btn);
  box.appendChild(el("p", "muted", "Até 2 análises independentes; depois uma análise final de consenso. As análises ficam salvas para todos."));
}

async function runGemini(id, box, btn) {
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> IA processando… (10-30s)';
  try { renderGeminiBox(id, box, await api("/api/gemini/" + id, { method: "POST" })); }
  catch (e) {
    btn.disabled = false; btn.innerHTML = ICON.spark + "<span>Tentar novamente</span>";
    const err = el("p", "err", "Falha: " + e.message); box.appendChild(err);
  }
}

function geminiFinal(f) {
  const d = el("div", "gres");
  d.style.borderLeft = "2px solid var(--accent)";
  let html = `<div class="gh" style="color:var(--accent);display:flex;align-items:center;gap:6px">${ICON.check}<span>Análise final — consenso</span></div><p>${f.summary || ""}</p>`;
  if (f.consensusBets?.length) {
    html += '<div class="scroll"><table><tr><th>Mercado</th><th>Palpite (consenso)</th><th class="p">Conf.</th></tr>';
    for (const b of f.consensusBets)
      html += `<tr><td>${b.market}</td><td><b>${b.selection}</b><div class="muted">${b.rationale || ""}</div></td>`
        + `<td class="p conf-${b.confidence}">${b.confidence || ""}</td></tr>`;
    html += '</table></div>';
  } else {
    html += '<p class="muted">As duas análises não convergiram em nenhum palpite.</p>';
  }
  if (f.divergences?.length) html += '<p class="muted">Divergências: ' + f.divergences.join(" · ") + '</p>';
  d.innerHTML = html;
  return d;
}

function geminiResult(a, n, limit) {
  const d = el("div", "gres");
  let html = `<div class="gh">Análise ${n} de ${limit}</div><p>${a.summary || ""}</p>`;
  if (a.keyFactors?.length) html += '<ul>' + a.keyFactors.map(k => '<li>' + k + '</li>').join('') + '</ul>';
  if (a.topBets?.length) {
    html += '<div class="scroll"><table><tr><th>Mercado</th><th>Palpite</th><th class="p">Prob.</th><th class="p">Conf.</th></tr>';
    for (const b of a.topBets) {
      const prob = b.modelProbability != null ? pc(b.modelProbability) : "–";
      html += `<tr><td>${b.market}</td><td><b>${b.selection}</b><div class="muted">${b.rationale || ""}</div></td>`
        + `<td class="p">${prob}</td><td class="p conf-${b.confidence}">${b.confidence || ""}</td></tr>`;
    }
    html += '</table></div>';
  }
  if (a.cautions?.length) html += '<p class="muted">Riscos: ' + a.cautions.join(" · ") + '</p>';
  d.innerHTML = html;
  return d;
}

// ---------- dashboard ----------
let dashLoaded = false;
async function loadDashboard(force) {
  const root = document.getElementById("view-dashboard");
  if (dashLoaded && !force) return;
  root.innerHTML = '<p class="muted"><span class="spin"></span> Avaliando todos os jogos finalizados… (pode demorar na 1ª vez)</p>';
  try { renderDashboard(root, await api("/api/dashboard")); dashLoaded = true; }
  catch (e) { root.innerHTML = '<p class="err">Erro: ' + e.message + '</p>'; }
}

function renderDashboard(root, d) {
  root.innerHTML = "";
  if (!d.matchesEvaluated) { root.innerHTML = '<p class="muted">Ainda não há jogos finalizados para avaliar.</p>'; return; }
  root.appendChild(el("p", "muted", `Baseado em ${d.matchesEvaluated} jogo(s) finalizado(s). Previsões pré-jogo.`));

  const three = el("div", "three"); three.style.marginBottom = "14px";
  three.innerHTML = `
    <div><div class="v" style="color:${pColor(d.markets.overall.rate)}">${pct(d.markets.overall.rate)}</div><div class="l">Acerto geral (${d.markets.overall.hits}/${d.markets.overall.total})</div></div>
    <div><div class="v" style="color:${pColor(d.result.accuracy)}">${pct(d.result.accuracy)}</div><div class="l">Resultado 1X2 (${d.result.correct}/${d.result.total})</div></div>
    <div><div class="v">${d.result.avgBrier}</div><div class="l">Brier médio</div></div>`;
  root.appendChild(three);

  const grid = el("div", "grid");
  // by market
  const mc = el("div", "card"); mc.appendChild(el("h3", null, "Acerto por mercado"));
  const mw = el("div", "scroll"); const mt = el("table");
  mt.innerHTML = '<tr><th>Mercado</th><th class="p">Acertos</th><th class="p">Taxa</th></tr>';
  const sorted = Object.entries(d.markets.byMarket).sort((a, b) => (b[1].rate || 0) - (a[1].rate || 0));
  for (const [k, v] of sorted) mt.innerHTML += `<tr><td>${k}</td><td class="p">${v.hits}/${v.total}</td><td class="p">${pc(v.rate)}</td></tr>`;
  mw.appendChild(mt); mc.appendChild(mw); grid.appendChild(mc);

  // calibration
  const cc = el("div", "card"); cc.appendChild(el("h3", null, "Calibração (confiança × realidade)"));
  const cw = el("div", "scroll"); const ct = el("table");
  ct.innerHTML = '<tr><th>Confiança</th><th class="p">n</th><th class="p">Previsto</th><th class="p">Real</th></tr>';
  for (const c of d.calibration) ct.innerHTML += `<tr><td>${c.range}</td><td class="p">${c.n}</td><td class="p">${pc(c.predicted)}</td><td class="p">${pc(c.actual)}</td></tr>`;
  cw.appendChild(ct); cc.appendChild(cw);
  cc.appendChild(el("p", "muted", "Previsto ≈ Real significa modelo bem calibrado."));
  grid.appendChild(cc);
  root.appendChild(grid);

  // per match
  const pm = el("div", "card"); pm.style.marginTop = "14px"; pm.appendChild(el("h3", null, "Por jogo"));
  const pw = el("div", "scroll"); const pt = el("table");
  pt.innerHTML = '<tr><th>Jogo</th><th class="p">Placar</th><th class="p">1X2</th><th class="p">Mercados</th></tr>';
  for (const m of d.perMatch)
    pt.innerHTML += `<tr><td>${m.home} x ${m.away}</td><td class="p">${m.score}</td><td class="p">${chk(m.resultCorrect)}</td><td class="p">${pc(m.marketHitRate)}</td></tr>`;
  pw.appendChild(pt); pm.appendChild(pw); root.appendChild(pm);
}

boot();
